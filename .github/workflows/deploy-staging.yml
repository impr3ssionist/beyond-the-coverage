name: 🧪 Test & Deploy to Staging

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20.x'

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔍 Lint code
        run: npm run lint
        continue-on-error: true

      - name: 🧪 Run unit tests
        run: npm run test:ci

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

  lint-and-build:
    name: 🏗️ Build & Lint
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🏗️ Build application
        run: npm run build

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: .next/
          retention-days: 1

  deploy-staging:
    name: 🌐 Deploy to Staging
    needs: lint-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    environment:
      name: staging
      url: https://staging.beyondthecoverage.com

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: .next/

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci --omit=dev

      - name: 🌍 Deploy to Vercel (Staging)
        uses: vercel/action@v4
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
          vercel-args: '--prod=false'
          scope: ${{ secrets.VERCEL_ORG_ID }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_APP_URL: 'https://staging.beyondthecoverage.com'

      - name: 🔗 Integration tests
        run: |
          echo "Running integration tests against staging..."
          curl -f https://staging.beyondthecoverage.com || exit 1
          echo "✅ Staging deployment successful"

  notify-pr:
    name: 💬 Notify PR
    needs: [test, lint-and-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && always()
    
    steps:
      - name: 💬 Comment test results
        uses: actions/github-script@v7
        with:
          script: |
            const testResult = '${{ needs.test.result }}' === 'success' ? '✅' : '❌';
            const buildResult = '${{ needs.lint-and-build.result }}' === 'success' ? '✅' : '❌';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Test Results\n\n${testResult} Tests passed\n${buildResult} Build successful\n\n✨ Ready for staging deployment after merge!`
            });
